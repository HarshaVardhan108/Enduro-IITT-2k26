<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="greenTint">
      <feColorMatrix type="saturate" values="1.5"/>
      <feColorMatrix type="hueRotate" values="-30"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.8"/>
        <feFuncG type="linear" slope="1.2"/>
        <feFuncB type="linear" slope="0.6"/>
      </feComponentTransfer>
    </filter>
    <style>
      .intern-bg { fill: #021a13; }
    </style>
  </defs>
  
  <!-- Dark background -->
  <rect width="100" height="100" class="intern-bg"/>
  
  <!-- Intern image with green tint -->
  <image href="images/intern.png" x="0" y="0" width="100" height="100" preserveAspectRatio="xMidYMid slice" filter="url(#greenTint)"/>
  
  <!-- Green border glow -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#00ff00" stroke-width="2" opacity="0.6"/>
</svg>